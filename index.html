<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rainy Day - Static Layout</title>
    <style>
        body {
            background-color: #2b2b2b;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            overflow: auto;
        }

        #game-container {
            width: 4000px;
            height: 5000px;
            background-color: #1a1a1a;
            position: relative;
            margin: 0 auto;
            /* Sınır çizgisini dilersen kaldırabilirsin */
            border: 2px dashed #ffe600; 
        }

        /* Konumlandırmanın çalışması için resimlerin absolute olması şart */
        #game-container img {
            position: absolute;
            user-select: none; /* Resimlerin seçilip mavi olmasını engeller */
            pointer-events: none; /* Resimlere tıklanmasını/sürüklenmesini engeller */
        }
    </style>
</head>

    <div id="game-container">
